name: Build APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Prepare project (nadpisuje zepsute pliki + Cling)
        run: bash scripts/ci-prepare.sh

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Build debug APK
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Show build errors
        if: failure()
        run: |
          echo "=== Kotlin errors ==="
          grep -E "^e: file:" build.log || true
          echo "=== Last 100 lines ==="
          tail -n 100 build.log

      - name: Rename APK
        if: success()
        run: cp app/build/outputs/apk/debug/app-debug.apk music-is-better.apk

      - name: Publish APK to Releases
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v${{ github.run_number }}
          name: Music is Better APK #${{ github.run_number }}
          body: Pobierz music-is-better.apk i zainstaluj na Samsungu.
          files: music-is-better.apk
          make_latest: true

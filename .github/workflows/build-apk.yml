name: Build APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses and install SDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Download Cling (DLNA) libraries
        run: |
          mkdir -p app/libs
          BASE=http://4thline.org/m2
          curl -fsSL "${BASE}/org/fourthline/cling/cling-core/2.1.2/cling-core-2.1.2.jar" -o app/libs/cling-core-2.1.2.jar
          curl -fsSL "${BASE}/org/fourthline/cling/cling-support/2.1.2/cling-support-2.1.2.jar" -o app/libs/cling-support-2.1.2.jar
          curl -fsSL "${BASE}/org/seamless/seamless-util/1.1.2/seamless-util-1.1.2.jar" -o app/libs/seamless-util-1.1.2.jar
          curl -fsSL "${BASE}/org/seamless/seamless-http/1.1.2/seamless-http-1.1.2.jar" -o app/libs/seamless-http-1.1.2.jar
          curl -fsSL "${BASE}/org/seamless/seamless-xml/1.1.2/seamless-xml-1.1.2.jar" -o app/libs/seamless-xml-1.1.2.jar
          ls -la app/libs

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK for easy download
        run: cp app/build/outputs/apk/debug/app-debug.apk music-is-better.apk

      - name: Publish APK to Releases (no ZIP)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v${{ github.run_number }}
          name: Music is Better APK #${{ github.run_number }}
          body: |
            Gotowy plik APK aplikacji **Music is Better**.

            1. Pobierz plik **music-is-better.apk** (bez rozpakowywania)
            2. Wyślij na Samsung i zainstaluj
            3. Szukaj ikony **Music is Better** na telefonie
          files: music-is-better.apk
          make_latest: true

      - name: Upload APK artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: music-is-better-apk
          path: music-is-better.apk
          retention-days: 30
